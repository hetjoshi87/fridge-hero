<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fridge Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="hero-header">
      <h1>Fridge Hero 🍳</h1>
      <p class="subtitle">Turn your ingredients into magic</p>
    </header>

    <main>
      <section class="panel" aria-labelledby="ingredients-heading">
        <h2 id="ingredients-heading" class="visually-hidden">Your ingredients</h2>
        <form id="fridge-form" class="ingredient-form" novalidate>
          <div class="field">
            <label for="ingredient-1">Ingredient 1</label>
            <input type="text" id="ingredient-1" name="ingredient1" autocomplete="off" placeholder="e.g. eggs">
          </div>
          <div class="field">
            <label for="ingredient-2">Ingredient 2</label>
            <input type="text" id="ingredient-2" name="ingredient2" autocomplete="off" placeholder="e.g. spinach">
          </div>
          <div class="field">
            <label for="ingredient-3">Ingredient 3</label>
            <input type="text" id="ingredient-3" name="ingredient3" autocomplete="off" placeholder="e.g. cheese">
          </div>
          <button type="submit" class="primary-btn">Cook Magic ✨</button>
        </form>
      </section>

      <section id="result-card" class="result-card" hidden aria-live="polite">
        <div id="result-success" class="result-success" hidden>
          <h2 id="result-dish" class="result-title"></h2>
          <ol id="result-steps" class="result-steps"></ol>
        </div>
        <p id="result-error" class="result-card__error" hidden></p>
      </section>
    </main>
  </div>
  <script>window.__GEMINI_API_KEY__ = window.__GEMINI_API_KEY__ || "";</script>
  <script src="config.local.js"></script>
  <script src="script.js"></script>
</body>
</html>
